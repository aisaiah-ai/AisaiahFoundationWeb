name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: true

jobs:
  deploy:
    name: Build, Test & Deploy to Production
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    environment:
      name: production
      url: https://aisaiah.org
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint & type check
        run: |
          npm run lint
          npx tsc --noEmit

      - name: Pre-deploy audit (secrets present)
        run: |
          ./scripts/ci-audit.sh \
            NEXT_PUBLIC_FIREBASE_API_KEY \
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN \
            NEXT_PUBLIC_FIREBASE_PROJECT_ID \
            NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET \
            NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID \
            NEXT_PUBLIC_FIREBASE_APP_ID \
            CLOUDFLARE_API_TOKEN \
            CLOUDFLARE_ACCOUNT_ID
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY_PROD }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN_PROD }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID_PROD }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET_PROD }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID_PROD }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID_PROD }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_SITE_ENV: production
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY_PROD }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN_PROD }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID_PROD }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET_PROD }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID_PROD }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID_PROD }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test
        env:
          CI: true

      - name: Deploy to Cloudflare Pages (Production)
        id: deploy
        run: |
          npm install -g wrangler@3
          COMMIT_MSG=$(echo "${{ github.event.head_commit.message || 'Production deploy' }}" | head -1)
          set -o pipefail
          DEPLOY_OUTPUT=$(wrangler pages deploy out \
            --project-name=aisaiah-foundation-web \
            --branch=main \
            --commit-hash="${{ github.sha }}" \
            --commit-message="$COMMIT_MSG" 2>&1)
          echo "$DEPLOY_OUTPUT"
          DEPLOY_URL=$(echo "$DEPLOY_OUTPUT" | grep -o 'https://[^ ]*' | head -1)
          echo "deploy_url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "✅ Production deployment complete: $DEPLOY_URL"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deployment summary
        if: always()
        run: |
          echo "## Production Deployment" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.deploy.outcome }}" == "success" ]; then
            echo "✅ **Deployed successfully**" >> $GITHUB_STEP_SUMMARY
            echo "🌐 **URL**: https://aisaiah.org" >> $GITHUB_STEP_SUMMARY
            echo "📦 **Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> If you see stale content, hard refresh (\`Cmd+Shift+R\`) or wait 1-2 min for Cloudflare cache." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Deployment failed** — check logs above" >> $GITHUB_STEP_SUMMARY
          fi
